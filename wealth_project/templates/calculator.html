<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>How To Become Rich Planner</h1>
        <p style="text-align:center; margin-bottom:20px; color:#6b7280;">
            Plan your savings, investments, and future wealth smartly
        </p>

        <form action="/calculate" method="post" onsubmit="return validateForm()">
            <label>Monthly Income:</label>
            <input type="number" name="income" id="income" min="0" required>

            <label>Monthly Expenses:</label>
            <input type="number" name="expenses" id="expenses" min="0" required>

            <label>Annual Return Rate (%):</label>
            <input type="number" name="return_rate" id="return_rate" min="0" step="0.1" required>

            <label>Investment Duration (Years):</label>
            <input type="number" name="years" id="years" min="1" required>

            <label>Inflation Rate (%):</label>
            <input type="number" name="inflation_rate" id="inflation_rate" min="0" step="0.1" required>

            <button type="submit">Calculate Wealth</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
